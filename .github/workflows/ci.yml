name: NexusCRM CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend tests ──────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports: ["27017:27017"]
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/nexuscrm_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-jwt-secret-ci
          SECRET_KEY: test-secret-key-ci-32-chars-minimum
          APP_ENV: test
          DEBUG: "false"
          QSTASH_TOKEN: ""          # inline fallback in test
          CRON_SECRET: test-cron-secret
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ─── Frontend tests + build ─────────────────────────────────
  frontend-test:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ""          # empty = same origin (Vercel serves both)
          VITE_APP_NAME: NexusCRM
        run: npm run build

  # ─── Deploy to Vercel (frontend + backend together) ─────────
  deploy:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: "--prod"
