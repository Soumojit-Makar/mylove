version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: nexuscrm_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-nexuscrm_secret}
      MONGO_INITDB_DATABASE: nexuscrm
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - nexuscrm_net

  redis:
    image: redis:7.2-alpine
    container_name: nexuscrm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexuscrm_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexuscrm_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - media_data:/app/media
    networks:
      - nexuscrm_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexuscrm_celery
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - nexuscrm_net
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4 -Q default,emails,reports,workflows

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexuscrm_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
    networks:
      - nexuscrm_net
    command: celery -A app.core.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: nexuscrm_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nexuscrm_net
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000

  nginx:
    image: nginx:alpine
    container_name: nexuscrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nexuscrm_net

volumes:
  mongo_data:
  redis_data:
  media_data:

networks:
  nexuscrm_net:
    driver: bridge
